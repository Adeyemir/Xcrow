[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
arc = "https://rpc.testnet.arc.network"

[etherscan]
arc = { key = "any", url = "https://testnet.arcscan.app/api" }
